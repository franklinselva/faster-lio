# faster-lio reference configuration
#
# Algorithm-only parameters — sensor-agnostic. The library operates on
# generic PointXYZINormal clouds, so there are no LiDAR-brand knobs.
#
# Per-installation overrides (extrinsics, environment-specific tunings)
# should live in the caller's config, not here.

common:
  time_sync_en: false          # auto-sync LiDAR/IMU clocks if drift > 1s

# ── Preprocessing ──────────────────────────────────────────────────────
preprocess:
  blind: 0.5                   # discard points within this range (m)

# ── IEKF state estimation ──────────────────────────────────────────────
mapping:
  acc_cov: 0.1                 # accelerometer process noise (m/s²²/Hz)
  gyr_cov: 0.1                 # gyroscope process noise (rad/s²/Hz)
  b_acc_cov: 0.0001            # accelerometer bias random walk
  b_gyr_cov: 0.0001            # gyroscope bias random walk
  det_range: 100.0             # max LiDAR range used for matching (m)
  extrinsic_est_en: true       # online refinement of LiDAR↔IMU extrinsic

  # LiDAR pose in IMU frame — override per installation.
  extrinsic_T: [0, 0, 0]
  extrinsic_R: [1, 0, 0,
                0, 1, 0,
                0, 0, 1]

# ── IMU initialization ─────────────────────────────────────────────────
# Optional motion-gated IMU init. When enabled, IMUInit rejects samples
# that look non-static so gravity/bias averages are not contaminated by
# motion. When disabled (default), init behavior matches legacy Faster-LIO
# exactly (MAX_INI_COUNT=20 samples, unconditional averaging).
#
# The accel gate is *relative* to the running ‖mean_acc‖, so the same
# threshold works whether the sensor reports accel in m/s² or g.
# `gyr_thresh` is always rad/s.
imu_init:
  motion_gate_enabled: false   # set true to harden init (see below)
  acc_rel_thresh: 0.05         # |‖cur_acc‖ − ‖mean_acc‖| / ‖mean_acc‖
  gyr_thresh: 0.05             # rad/s max ‖cur_gyr‖
  min_accepted: 50             # samples that pass the gate before init completes
  max_tries: 1000              # ~5 s fail-soft cap at 200 Hz IMU

# ── Wheel odometry fusion ──────────────────────────────────────────────
# Optional body-frame velocity observations applied as sequential scalar
# Kalman updates AFTER the LiDAR IEKF converges. Chassis-agnostic: the
# caller (AddWheelOdom) fills only the components its chassis measures.
# Block absent or `enabled: false` preserves legacy LiDAR-only behavior.
#
# NHC = non-holonomic virtual observation. Emit v_y = 0 / v_z = 0 at the
# frame time, independent of the wheel message. KINEMATIC ASSUMPTION
# only — enable for chassis that physically cannot move on that axis.
#   diff / Ackermann / skid-steer: emit_nhc_v_y=true,  emit_nhc_v_z=true
#   omni / mecanum / 4WS:          emit_nhc_v_y=false, emit_nhc_v_z=true
#   drone / aquatic:               emit_nhc_v_y=false, emit_nhc_v_z=false
# wheel:
#   enabled: false
#   cov_v_x: 0.01                # (m/s)^2 body-frame forward velocity obs noise
#   cov_v_y: 0.01                # used only if AddWheelOdom provides v_body_y
#   cov_v_z: 0.001               # used only if AddWheelOdom provides v_body_z
#   cov_omega_z: 0.01            # reserved (not yet wired into the update)
#   emit_nhc_v_y: true
#   emit_nhc_v_z: true
#   nhc_cov: 0.001               # (m/s)^2 covariance for the NHC virtual obs
#   max_time_gap: 0.05           # reject wheel samples older than this vs lidar_end_time

# ── Map and matching ───────────────────────────────────────────────────
point_filter_num: 1            # keep every Nth point (1 = no downsampling)
max_iteration: 3               # IEKF inner iterations per scan
filter_size_surf: 0.5          # voxel filter on input scan (m)
filter_size_map: 0.5           # voxel filter on map insertion (m)
cube_side_length: 1000         # iVox map extent (m)

ivox_grid_resolution: 0.5      # iVox voxel leaf size (m)
ivox_nearby_type: 18           # 6, 18, or 26 neighbor voxels
esti_plane_threshold: 0.1      # k-NN plane-fit residual threshold (m)

# Reject points with poor k-NN plane fit from map insertion.
# Must be ≤ esti_plane_threshold. Set to 0 to disable.
map_quality_threshold: 0.08

# ── Output ─────────────────────────────────────────────────────────────
output:
  path_en: false               # publish running path
  dense_en: false              # publish full-density map
  path_save_en: true           # save trajectory to disk on Finish()

pcd_save:
  pcd_save_en: false           # save accumulated map as PCD
  interval: -1                 # -1 = save once at end
